model:
  yolo:
    weights: "weights/yolo_cell_detector.pt"
    img_size: 640
    conf_threshold: 0.45
    iou_threshold: 0.5
    device: "mps"

  cnn:
    weights: "weights/cnn_classifier.pt"
    num_classes: 2
    input_size: [224, 224]
    backbone: "efficientnet_b0"
    device: "mps"

  classes:
    - "Normal Lymphocyte"
    - "ALL Blast"

inference:
  max_cells_per_image: 50
  min_cell_conf: 0.4
  aggregation: "majority"
  batch_size: 16

preprocessing:
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
  clahe: true
  clahe_clip_limit: 2.0
  clahe_tile_grid: [8, 8]

training:
  epochs: 50
  batch_size: 32
  lr: 0.0001
  weight_decay: 0.0001
  scheduler: "cosine"
  early_stopping_patience: 8
  data_dir: "data/processed"
  val_split: 0.15
  test_split: 0.10
  augmentation: true
  save_dir: "weights"
  log_dir: "logs"

server:
  host: "0.0.0.0"
  port: 8000
  max_upload_mb: 20
  allowed_extensions: [".jpg", ".jpeg", ".png", ".tif", ".tiff"]
  result_ttl_seconds: 3600